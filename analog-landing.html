<style>
  :root { --black:#000; --white:#fff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--white); color: var(--black);
    font-family: "Inter Tight", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .frame {
    position: fixed; inset: clamp(14px, 2.4vw, 26px);
    border: 2px solid var(--black); background: var(--white);
  }
  .logo {
    position: absolute;
    top: clamp(1.1rem, 3vw, 2rem);
    left: clamp(1.2rem, 3.2vw, 2.1rem);
    width: clamp(138px, 17vw, 188px);
    height: auto; z-index: 2;
  }
  .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    gap: clamp(1.4rem, 3.6vh, 2.6rem);
    padding: clamp(2rem, 6vw, 5rem) clamp(2rem, 6vw, 5rem) clamp(6rem, 14vh, 10rem); overflow: auto;
  }
  .illo-img { width: clamp(280px, 48vw, 520px); height: auto; display: block; }
  .tagline {
    font-family: "Inter Tight", sans-serif; font-weight: 500;
    line-height: 1.12; letter-spacing: -0.01em;
    font-size: clamp(1.9rem, 5.4vw, 3.4rem); max-width: 18ch;
  }
  .tagline em {
    font-family: "Fraunces", Georgia, serif; font-optical-sizing: auto;
    font-style: italic; font-weight: 600; font-variation-settings: "opsz" 144;
    font-size: 1.18em; line-height: 1;
  }
  .subhead {
    font-family: "Inter Tight", sans-serif; font-weight: 400;
    font-size: clamp(0.95rem, 1.5vw, 1.12rem); line-height: 1.55;
    color: rgba(0,0,0,0.6); max-width: 42ch;
    margin-top: clamp(-1.4rem, -2.5vw, -0.5rem);
  }
  .cta {
    display: inline-flex; align-items: center; gap: 0.6em;
    background: transparent; color: var(--black);
    font-family: "Inter Tight", sans-serif; font-weight: 600;
    font-size: 0.98rem; letter-spacing: 0.04em; text-transform: uppercase;
    text-decoration: none; padding: 1.05rem 2.4rem;
    border: 2px solid var(--black);
    transition: background .28s ease, color .28s ease;
  }
  .cta .arrow { transition: transform .28s ease; }
  .cta:hover { background: var(--black); color: var(--white); }
  .cta:hover .arrow { transform: translateX(5px); }
  .cta:focus-visible { outline: 2px solid var(--black); outline-offset: 4px; }
  @media (prefers-reduced-motion: reduce) { .cta, .cta .arrow { transition: none; } }
</style>
